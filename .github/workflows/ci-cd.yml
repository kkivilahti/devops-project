name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm run install:all

      - name: Lint code
        run: npm run lint:backend
      - name: Run tests
        run: npm run test:backend

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm run install:all

      - name: Lint code
        run: npm run lint:frontend
      - name: Run tests
        run: npm run test:frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    # Only runs when a tag starting with "v" is pushed (v1.0 etc.)
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend image
        working-directory: ./backend
        run: |
          docker build -t kirsik/task-manager-backend:latest .
          docker push kirsik/task-manager-backend:latest

      - name: Build and push frontend image
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL}}
        run: |
          docker build -t kirsik/task-manager-frontend:latest .
          docker push kirsik/task-manager-frontend:latest

      - name: Deploy to Render
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}
